<!DOCTYPE html>
<html>

<head>
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Container for the form to match dashboard padding */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            /* Light gray background to match dashboard */
            padding: 40px;
            color: #333;
        }

        h2 {
            color: #6a1b9a;
            /* Matching the purple theme */
            margin-bottom: 20px;
        }

        /* Form Card Styling */
        form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* Soft shadow like the dashboard cards */
        }

        /* Label Styling */
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            display: block;
            margin-bottom: 8px;
        }

        /* Input Field Styling */
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 5px;
            /* Spacing handled by br in your HTML, but this adds safety */
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            /* Ensures padding doesn't break width */
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #6a1b9a;
            /* Purple highlight on click */
        }

        /* Submit Button (Matching the Logout/Sidebar vibe) */
        input[type="submit"] {
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #4a148c;
            /* Darker purple on hover */
        }

        /* Back Link Styling */
        a {
            display: inline-block;
            margin-top: 20px;
            color: #6a1b9a;
            text-decoration: none;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h2>Edit Book</h2>
    <form method="post">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" placeholder="Author's Name" required><br><br>

        <label for="author">Author:</label><br>
        <input type="text" id="author" name="author" placeholder="Author name" required><br><br>

        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" placeholder="Eg: 1" required><br><br>

        <label for="description">Description:</label><br>
        <input type="text" id="author" name="description" placeholder="Description" required><br><br>


        <input type="submit" value="Add Book">
    </form>
    <br>
    <a href="{{ url_for('books') }}">Back to Books List</a>
</body>

</html>
