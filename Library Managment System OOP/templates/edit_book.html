<!DOCTYPE html>
<html>

<head>
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Container for the form to match dashboard padding */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            /* Light gray background to match dashboard */
            padding: 40px;
            color: #333;
        }

        h2 {
            color: #6a1b9a;
            /* Matching the purple theme */
            margin-bottom: 20px;
        }

        /* Center the entire wrapper inside the main-content */
        .form-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Horizontal centering */
            justify-content: center;
            /* Vertical centering */
            min-height: 80vh;
            /* Uses 80% of the screen height to find the center */
            width: 100%;
        }

        /* Form Card Styling */
        .form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* Soft shadow like the dashboard cards */
        }

        /* Center the heading and back link relative to the form */
        h2,
        .back-link {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }



        /* Label Styling */
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            display: block;
            margin-bottom: 8px;
        }

        /* Input Field Styling */
        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus {
            outline: none;
            border-color: #6a1b9a;
            /* Purple highlight on click */
        }

        /* Submit Button (Matching the Logout/Sidebar vibe) */
        input[type="submit"] {
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #4a148c;
            /* Darker purple on hover */
        }

        /* Back Link Styling */
        a {
            display: inline-block;
            margin-top: 20px;
            color: #6a1b9a;
            text-decoration: none;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="form-wrapper">
        <h2>Edit Book</h2>
        {% if error %}
        <div class="error-message" style="width: 500px; background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="form" action="{{ url_for('edit_book', id=book.id) }}" enctype="multipart/form-data">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" value="{{ book.title }}" placeholder="Book Title" required>

            <label for="author">Author *</label>
            <input type="text" id="author" name="author" value="{{ book.author }}" placeholder="Author name" required>

            <label for="genre">Genre *</label>
            <select id="genre" name="genre" required>
                <option value="">Select a genre...</option>
                {% for category in categories %}
                <option value="{{ category.category_name }}" {% if book.genre == category.category_name %}selected{% endif %}>
                    {{ category.category_name }}
                </option>
                {% endfor %}
            </select>

            <label for="quantity">Quantity *</label>
            <input type="number" id="quantity" name="quantity" value="{{ book.quantity }}" placeholder="Eg: 1" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Book description..." required>{{ book.description or '' }}</textarea>

            <label for="image_file">Replace Image File</label>
            <input type="file" id="image_file" name="image_file" accept=".jpeg,.jpg,.png,.webp">

            <input type="submit" value="Update Book">
        </form>
        <a href="{{ url_for('books') }}" class="back-link">Back to Books List</a>
    </div>
</body>

</html>
