<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add New Book - Library System</title>
    <style>
        /* Existing Dashboard Styles */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color:rgba(241, 249, 241, 0.9);
        }

        .sidebar {
            width: 300px;
            background-color: #5d0f72;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .nav-links li {
            padding: 15px 25px;
            display: flex;
            align-items: center;
        }

        .nav-links li.active {
            background-color: #7b1fa2;
            border-left: 4px solid #ffffff;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            width: 100%;
        }

        .main-content {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
        }

        /* Form Styling */
        form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            /* Fixed width for the form card */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="submit"] {
            background-color: #5d0f72;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Library System</h3>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li class="active"><a href="{{ url_for('books') }}">Books</a></li>
            <li><a href="#">My History</a></li>
            <li><a href="#">Fines & Dues</a></li>
            <li><a href="#">Profile Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div
            style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh;">
            <h2 style="color: #333; margin-bottom: 20px;">Add New Book</h2>

            {% if error %}
            <div class="error-message" style="width: 400px; background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="{{ url_for('add_book') }}" enctype="multipart/form-data">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" placeholder="Book Title" required>

                <label for="author">Author *</label>
                <input type="text" id="author" name="author" placeholder="Author Name" required>

                <label for="genre">Genre *</label>
                <select id="genre" name="genre" required>
                    <option value="">Select a genre...</option>
                    {% for category in categories %}
                    <option value="{{ category.category_name }}">{{ category.category_name }}</option>
                    {% endfor %}
                </select>

                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" placeholder="Eg: 1" required>

                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Book description..." required></textarea>

                <label for="image_file">Image File</label>
                <input type="file" id="image_file" name="image_file" accept=".jpeg,.jpg,.png,.webp">

                <input type="submit" value="Add Book">
            </form>

            <a href="{{ url_for('dashboard') }}?section=books"
                style="margin-top: 20px; color: #5d0f72; text-decoration: none; font-weight: bold;">
                ← Back to Dashboard
            </a>
        </div>
    </div>
</body>

</html>
